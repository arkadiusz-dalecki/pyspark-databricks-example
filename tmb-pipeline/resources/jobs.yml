resources:
  jobs:
    tmb_analysis_job:
      name: tmb-analysis-${bundle.target}

      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1

      tasks:
        - task_key: analyze
          job_cluster_key: main
          spark_python_task:
            python_file: ../src/tmb_analysis.py
